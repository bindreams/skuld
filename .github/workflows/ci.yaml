name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # setup-rust is still needed so the cargo-fmt / cargo-clippy /
      # cargo-xtask-version hooks inside prek can find a Rust toolchain.
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      # Single source of truth for lint is prek.toml — the same checks run
      # locally as pre-commit hooks. prek-action runs `prek run --all-files`
      # with `--show-diff-on-failure --color=always`, so fmt / mdformat /
      # mixed-line-ending failures surface as a diff in CI logs.
      - uses: j178/prek-action@v2

  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: darwin
            arch: amd64
            runner: macos-15
            target: x86_64-apple-darwin
          - os: windows
            arch: amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}

      - name: Build workspace
        # Exclude xtask from the matrix: it's a dev tool run only on the lint
        # host (Linux), and its deps aren't worth cross-compiling to 6 targets.
        run: cargo build --workspace --exclude xtask --target ${{ matrix.target }}

      - name: Unit tests
        run: cargo test --workspace --exclude xtask --target ${{ matrix.target }}
