name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Verify workspace version consistency
        run: cargo xtask version

  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: darwin
            arch: amd64
            runner: macos-15
            target: x86_64-apple-darwin
          - os: windows
            arch: amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}

      - name: Build workspace
        # Exclude xtask from the matrix: it's a dev tool run only on the lint
        # host (Linux), and its deps aren't worth cross-compiling to 6 targets.
        run: cargo build --workspace --exclude xtask --target ${{ matrix.target }}

      - name: Unit tests
        run: cargo test --workspace --exclude xtask --target ${{ matrix.target }}
