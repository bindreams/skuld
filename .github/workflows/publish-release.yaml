name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

concurrency:
  group: publish-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  # Preflight runs BEFORE the Deploy environment gate, so trivial operator
  # errors (invalid version string, missing draft, draft pinned to a branch
  # instead of a SHA) fail loudly without waiting for approver attention.
  preflight:
    name: Preflight (validate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      commit_sha: ${{ steps.release.outputs.commit_sha }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Normalize and validate version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          V="${INPUT_VERSION#v}"
          if ! [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version: '${INPUT_VERSION}'"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Verify draft release exists and resolve commit SHA
        id: release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if ! RELEASE_JSON=$(gh release view "$TAG" --json isDraft,targetCommitish); then
            echo "::error::gh release view failed for $TAG. Does the draft release exist?"
            exit 1
          fi

          IS_DRAFT=$(echo "$RELEASE_JSON" | jq -r '.isDraft')
          if [ "$IS_DRAFT" != "true" ]; then
            echo "::error::Release $TAG is already published"
            exit 1
          fi

          TARGET=$(echo "$RELEASE_JSON" | jq -r '.targetCommitish')
          if ! [[ "$TARGET" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Draft release target '$TARGET' is not a 40-char commit SHA. Recreate the draft via the Draft Release workflow."
            exit 1
          fi
          echo "commit_sha=$TARGET" >> "$GITHUB_OUTPUT"

  publish:
    name: Verify and publish
    needs: preflight
    runs-on: ubuntu-latest
    # The Deploy environment scopes CARGO_REGISTRY_TOKEN to this job only and
    # enforces any environment protection rules (required reviewers, wait
    # timers) configured in the repo. Placed AFTER preflight so operator
    # typos fail before the approver is pinged.
    environment: Deploy
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-rust

      - name: Re-verify workspace version matches release
        # Belt-and-suspenders: the checked-out commit's Cargo.toml must agree
        # with the version being published.
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git tag "$TAG"
          cargo xtask version --check --exact

      - name: Publish skuld-macros and skuld
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # cargo 1.84+ publishes multiple workspace members in topological order
        # (skuld-macros first, then skuld) and waits for each to appear on the
        # sparse index before publishing the next. This replaces the manual
        # publish-wait-publish dance.
        run: cargo publish -p skuld-macros -p skuld --locked

      - name: Publish GitHub release
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "$TAG" --draft=false
          echo "Release published: https://github.com/${REPO}/releases/tag/$TAG"
