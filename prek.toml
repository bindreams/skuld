exclude = "^external/"
default_install_hook_types = ["pre-commit", "commit-msg"]

# Local hooks ==========================================================================================================

[[repos]]
repo = "local"

[[repos.hooks]]
id = "no-std-test"
name = "no stray #[test] attribute"
entry = '^\s*#\[test\]'
language = "pygrep"
types = ["rust"]
# Exclude files whose purpose is specifically to use the standard libtest
# harness:
#   * anything matching `_tests.rs` (the project convention for
#     skuld-harnessed unit tests — skuld itself would exclude those too)
#   * anything under a top-level or nested `tests/` directory
exclude = '(_tests\.rs|(^|/)tests/)'

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-xtask-version"
name = "cargo xtask version --check"
# Asserts:
#   1. workspace members agree on a strict MAJOR.MINOR.PATCH version
#   2. skuld-macros dep pin matches
#   3. Cargo.toml version == or one-bump-after some nearest ancestor tag
#      (prevents main from drifting ahead of released tags without a release)
entry = "cargo xtask version --check"
language = "system"
# Only run when a Cargo.toml changes — the check reads manifests, not src.
files = '(^|/)Cargo\.toml$'
pass_filenames = false

# External hooks =======================================================================================================

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable", exclude_types = ["rust"] },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
# Using prettier instead of mdformat because prettier preserves the
# `  ` (two-space) trailing-whitespace line break style instead of
# rewriting it to `\`. That matters for files like LICENSE.md whose
# byte identity is conventional.
repo = "https://github.com/rbubley/mirrors-prettier"
rev = "v3.8.2"
hooks = [
  { id = "prettier", types = ["markdown"] },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "3.2.1"
hooks = [
  { id = "editorconfig-checker", exclude_types = ["rust", "markdown"] },
]
